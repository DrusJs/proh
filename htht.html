    <script type="module">
        import { Dictionary } from "./scripts/Dictionary.js";
        import { App } from "./scripts/App.js?v=1.1.0";

        const getCookie = (name) => {
            const matches = document.cookie.match(
                new RegExp("(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, "\\$1") + "=([^;]*)")
            );
            return matches ? decodeURIComponent(matches[1]) : undefined;
        };

        fetch("./lang.json", {})
            .then((response) => response.json())
            .then((json) => {
                Dictionary.init(json[getCookie("lang") ?? "en"]);

                const app = new App({
                    editable: true,
                    update: true,
                    projectId: "1",
                    productId: "2",
                    dataId: "3",
                    productData: "4",
                });
            })
            .catch((error) => {
                console.error(error);
            });
    </script>
