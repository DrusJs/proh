<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Luxforge</title>
		<link rel="stylesheet" href="./style.css?v2">
	</head>
	<body>

		<div class="panel">
			<div class="panel-grid">
				<span>Modèle</span>
				<select>
					<option>Roundline</option>
					<option>Flatline</option>
					<option>Oceanline</option>
				</select>
				<span>Couleur</span>
				<select>
					<option>DB703</option>
					<option>RAL 7013</option>
					<option>RAL 7016</option>
					<option>RAL 8019</option>
					<option>RAL 9001</option>
					<option>RAL 9005</option>
					<option>RAL 9007</option>
					<option>RAL 9016</option>
				</select>
				<span>Nombre de tiges</span>
				<select>
					<option>2</option>
					<option>3</option>
					<option>4</option>
					<option>5</option>
				</select>			
				<span>Jonction</span>
				<select>
					<option>droit</option>
					<option>arrondie</option>
				</select>
			</div>
		</div>

		<script type="importmap">
			{
				"imports": 
				{
					"three":"./scripts/three.module.min.js",
					"three/addons/":"./scripts/addons/"
				}
			}
		</script>
		<script type="module">
			import { Dictionary } from './scripts/Dictionary.js';
			import { App } from './scripts/App.js?v=1.1.0';
			
			const getCookie = ( name ) => 
			{
				const matches = document.cookie.match( new RegExp( '(?:^|; )' + name.replace( /([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1' ) + '=([^;]*)' ) );
				return matches ? decodeURIComponent( matches[ 1 ] ) : undefined;
			};
			
			fetch( './lang.json', {} )
			.then( response => response.json() )
			.then( json => 
			{
				Dictionary.init( json[ getCookie( 'lang' ) ?? 'en' ] );
				
				const app = new App
				( {
					editable:true,
					update:true,
					projectId:'1',
					productId:'2',
					dataId:'3',
					productData:'4',
				} );				
			} )
			.catch( error => 
			{
				console.error( error );				
			} );
		</script>
	</body>
</html>
